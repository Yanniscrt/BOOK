    <script>
        // Sélectionnez toutes les images avec la classe "fullscreen-img"
        const images = document.querySelectorAll('.fullscreen-img');
        let currentIndex = 0;

        // Ajoutez un gestionnaire d'événements de clic à chaque image
        images.forEach((image, index) => {
            image.addEventListener('click', () => {
                currentIndex = index;
                displayImage(currentIndex);
            });
        });

        // Fonction pour afficher l'image agrandie
        function displayImage(index) {
            // Vérifie s'il y a déjà une image agrandie affichée
            const existingEnlargedImage = document.querySelector('.enlarged-image');
            if (existingEnlargedImage) {
                document.body.removeChild(existingEnlargedImage);
            }

            // Créez une nouvelle balise d'image pour afficher l'image en grand
            const enlargedImage = document.createElement('img');
            enlargedImage.src = images[index].src;
            enlargedImage.alt = images[index].alt;
            enlargedImage.className = 'enlarged-image'; // Ajoute une classe pour faciliter la sélection

            // Créer une croix pour fermer l'image agrandie
            const closeButton = document.createElement('span');
            closeButton.innerHTML = '&times;';
            closeButton.className = 'close-button';

            // Ajoutez un gestionnaire d'événements de clic pour fermer l'image agrandie
            closeButton.addEventListener('click', () => {
                document.body.removeChild(enlargedImage);
                document.body.removeChild(closeButton);
            });

            // Stylez la croix pour qu'elle soit en haut à droite
            closeButton.style.position = 'absolute';
            closeButton.style.top = '10px';
            closeButton.style.right = '10px';
            closeButton.style.cursor = 'pointer';
            closeButton.style.color = '#fff';
            closeButton.style.fontSize = '20px';
            closeButton.style.zIndex = '10000';

            // Stylez l'image agrandie
            enlargedImage.style.position = 'fixed';
            enlargedImage.style.top = '0';
            enlargedImage.style.left = '0';
            enlargedImage.style.width = '100%';
            enlargedImage.style.height = '100%';
            enlargedImage.style.objectFit = 'contain';
            enlargedImage.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
            enlargedImage.style.zIndex = '9999';
            enlargedImage.style.cursor = 'pointer';

            // Ajoutez l'image agrandie au corps du document
            document.body.appendChild(enlargedImage);
            document.body.appendChild(closeButton);

            // Ajoutez un gestionnaire d'événements de clic pour la navigation entre les images
            document.addEventListener('keydown', handleKeyPress);
        }

        // Fonction pour gérer la navigation entre les images avec les touches gauche et droite
        function handleKeyPress(event) {
            if (event.key === 'ArrowLeft') {
                currentIndex = (currentIndex === 0) ? images.length - 1 : currentIndex - 1;
                displayImage(currentIndex);
            } else if (event.key === 'ArrowRight') {
                currentIndex = (currentIndex === images.length - 1) ? 0 : currentIndex + 1;
                displayImage(currentIndex);
            }
        }
    </script>
